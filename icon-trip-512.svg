<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#1C1410"/>
  <!-- Bottom accent bar -->
  <rect x="0" y="486" width="512" height="26" fill="#C4572A"/>

  <!-- Route line -->
  <polyline points="80,396 192,256 298,330 432,136"
    fill="none" stroke="#D4963A" stroke-width="20"
    stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Waypoint dots -->
  <circle cx="80"  cy="396" r="26" fill="#C4572A" stroke="#1C1410" stroke-width="8"/>
  <circle cx="192" cy="256" r="20" fill="#D4963A" stroke="#1C1410" stroke-width="8"/>
  <circle cx="298" cy="330" r="20" fill="#D4963A" stroke="#1C1410" stroke-width="8"/>
  <!-- Destination -->
  <circle cx="432" cy="136" r="34" fill="none"    stroke="#C4572A" stroke-width="10"/>
  <circle cx="432" cy="136" r="16" fill="#C4572A"/>
</svg>
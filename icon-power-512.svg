<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#1C1410"/>
  <!-- Bottom clay bar accent matching fuel icon style -->
  <rect x="0" y="486" width="512" height="26" fill="#C4572A"/>
  <rect x="256" y="486" width="256" height="26" fill="#D4963A"/>

  <!-- Battery body outline -->
  <rect x="72" y="168" width="320" height="192" rx="18" fill="none" stroke="#3D2B1A" stroke-width="36"/>
  <rect x="72" y="168" width="320" height="192" rx="18" fill="none" stroke="#D4963A" stroke-width="8"/>
  <!-- Battery terminal (positive cap) -->
  <rect x="392" y="216" width="48" height="96" rx="10" fill="#3D2B1A"/>
  <rect x="392" y="216" width="48" height="96" rx="10" fill="none" stroke="#D4963A" stroke-width="6"/>

  <!-- Battery fill (charge level ~75%) -->
  <rect x="88" y="184" width="232" height="160" rx="8" fill="#D4963A" opacity="0.22"/>
  <rect x="88" y="184" width="232" height="160" rx="8" fill="#D4963A" opacity="0.15"/>
  <!-- Fill bar -->
  <rect x="90" y="186" width="229" height="156" rx="7" fill="#C4572A" opacity="0.0"/>

  <!-- Lightning bolt - centred in battery -->
  <polygon points="276,188 216,272 252,272 236,324 300,240 264,240 276,188"
    fill="#D4963A"/>
  <polygon points="276,188 216,272 252,272 236,324 300,240 264,240 276,188"
    fill="#F5EDDA" opacity="0.15"/>

  <!-- SOC dots at bottom -->
  <circle cx="150" cy="410" r="14" fill="#C4572A"/>
  <circle cx="196" cy="410" r="14" fill="#C4572A"/>
  <circle cx="242" cy="410" r="14" fill="#C4572A"/>
  <circle cx="288" cy="410" r="14" fill="#3D2B1A"/>
</svg>

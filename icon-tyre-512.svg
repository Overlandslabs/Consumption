<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="64" fill="#1C1410"/>
  <!-- Outer tyre ring -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="#e07800" stroke-width="48"/>
  <!-- Inner rim -->
  <circle cx="256" cy="256" r="106" fill="none" stroke="#e07800" stroke-width="16"/>
  <!-- Hub centre -->
  <circle cx="256" cy="256" r="32" fill="#e07800"/>
  <!-- Tread blocks — cardinal -->
  <rect x="234" y="42" width="44" height="36" rx="5" fill="#e07800"/>
  <rect x="234" y="434" width="44" height="36" rx="5" fill="#e07800"/>
  <rect x="42" y="234" width="36" height="44" rx="5" fill="#e07800"/>
  <rect x="434" y="234" width="36" height="44" rx="5" fill="#e07800"/>
  <!-- Tread blocks — diagonal -->
  <rect x="346" y="74" width="38" height="32" rx="5" fill="#e07800" transform="rotate(45 365 90)"/>
  <rect x="128" y="406" width="38" height="32" rx="5" fill="#e07800" transform="rotate(45 147 422)"/>
  <rect x="74" y="346" width="32" height="38" rx="5" fill="#e07800" transform="rotate(45 90 365)"/>
  <rect x="406" y="128" width="32" height="38" rx="5" fill="#e07800" transform="rotate(45 422 147)"/>
  <!-- Spoke lines -->
  <line x1="256" y1="150" x2="256" y2="118" stroke="#b86800" stroke-width="8"/>
  <line x1="256" y1="394" x2="256" y2="362" stroke="#b86800" stroke-width="8"/>
  <line x1="150" y1="256" x2="118" y2="256" stroke="#b86800" stroke-width="8"/>
  <line x1="394" y1="256" x2="362" y2="256" stroke="#b86800" stroke-width="8"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="24" fill="#1C1410"/>
  <!-- Outer tyre ring -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="#e07800" stroke-width="18"/>
  <!-- Inner rim -->
  <circle cx="96" cy="96" r="40" fill="none" stroke="#e07800" stroke-width="6"/>
  <!-- Hub centre -->
  <circle cx="96" cy="96" r="12" fill="#e07800"/>
  <!-- Tread blocks — 4 pairs at cardinal points -->
  <rect x="88" y="16" width="16" height="14" rx="2" fill="#e07800"/>
  <rect x="88" y="162" width="16" height="14" rx="2" fill="#e07800"/>
  <rect x="16" y="88" width="14" height="16" rx="2" fill="#e07800"/>
  <rect x="162" y="88" width="14" height="16" rx="2" fill="#e07800"/>
  <!-- Tread blocks — diagonal -->
  <rect x="130" y="28" width="14" height="12" rx="2" fill="#e07800" transform="rotate(45 137 34)"/>
  <rect x="48" y="152" width="14" height="12" rx="2" fill="#e07800" transform="rotate(45 55 158)"/>
  <rect x="28" y="130" width="12" height="14" rx="2" fill="#e07800" transform="rotate(45 34 137)"/>
  <rect x="152" y="48" width="12" height="14" rx="2" fill="#e07800" transform="rotate(45 158 55)"/>
  <!-- Spoke lines -->
  <line x1="96" y1="56" x2="96" y2="44" stroke="#b86800" stroke-width="3"/>
  <line x1="96" y1="148" x2="96" y2="136" stroke="#b86800" stroke-width="3"/>
  <line x1="56" y1="96" x2="44" y2="96" stroke="#b86800" stroke-width="3"/>
  <line x1="148" y1="96" x2="136" y2="96" stroke="#b86800" stroke-width="3"/>
</svg>

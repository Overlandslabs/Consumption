<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <rect width="192" height="192" fill="#1C1410"/>
  <rect x="0" y="182" width="192" height="10" fill="#C4572A"/>
  <!-- Gauge arc track (full semicircle) -->
  <path d="M 40 130 A 70 70 0 0 1 152 130"
    fill="none" stroke="#3D2B1A" stroke-width="16" stroke-linecap="round"/>
  <!-- Gauge arc fill (indicating ~70% range) -->
  <path d="M 40 130 A 70 70 0 0 1 130 68"
    fill="none" stroke="#D4963A" stroke-width="10" stroke-linecap="round"/>
  <!-- Needle -->
  <line x1="96" y1="130" x2="128" y2="72"
    stroke="#C4572A" stroke-width="8" stroke-linecap="round"/>
  <!-- Pivot -->
  <circle cx="96" cy="130" r="10" fill="#C4572A"/>
  <circle cx="96" cy="130" r="4" fill="#1C1410"/>
</svg>